version: "3.9"

# ScrollTone loads a single Kokoro model per job (~1.5 GB).
# Exit code 137 = OOM kill → increase mem_limit below.

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scrolltone-backend
    # Port 7860 is the raw API — accessible for debugging, not needed for normal use
    ports:
      - "7860:7860"
    volumes:
      # Persist generated audiobooks across restarts
      - ./audiobook_output:/tmp/tts_outputs
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    mem_limit: 4g
    memswap_limit: 6g
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Uncomment for GPU support (requires nvidia-docker):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: scrolltone-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
