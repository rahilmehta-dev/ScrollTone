server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy all API calls to the backend container
    location /api/ {
        proxy_pass         http://backend:7860/api/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

        # Required for SSE (Server-Sent Events) streaming
        proxy_http_version 1.1;
        proxy_set_header   Connection '';
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;

        # Generous timeout for long conversions
        proxy_read_timeout 3600s;
    }

    # Serve frontend static files; fall back to index.html for SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
